name: Agentic CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log Execution Environment
        run: |
          echo "=== Execution Environment ==="
          echo "OS: ${{ runner.os }}"
          echo "GitHub Ref: ${{ github.ref }}"
          uname -a

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Formatter
        run: ruff format --check .

      - name: Run Ruff Linter & Generate SARIF
        # Run ruff and generate SARIF output for GitHub Security Tab
        run: ruff check . --output-format=sarif -o ruff-results.sarif
        continue-on-error: true

      - name: Run Ruff Linter (Strict)
        # Ensure the step fails if there are linting errors
        run: ruff check .

      - name: Run Black
        run: black --check .

      - name: Run MyPy
        run: mypy src/ tests/

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Upload SARIF Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ruff-results.sarif
          category: ruff

  unit-test:
    name: Unit Tests & Coverage
    needs: lint-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f pyproject.toml ]; then pip install -e .; elif [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Pytest
        run: pytest tests/unit/ --cov=src --cov-report=xml --junitxml=junit-results.xml

  llm-eval:
    name: Agentic Evaluation (LLM-Eval)
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then pip install -e .; elif [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install deepeval pytest

      - name: Run DeepEval against Golden Dataset
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Additional keys required for the agent
        run: |
          echo "Executing Agentic Evaluation..."
          # The threshold logic (>= 0.85) should be defined within the evaluation scripts in tests/evals/
          pytest tests/evals/
